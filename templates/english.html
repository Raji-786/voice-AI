<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Text to Speech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">← Back</a>
            <div class="logo">🎤 VOICE AI</div>
        </div>
        
        <div class="tts-container">
            <div class="settings-group">
                <h3>⚙️ Voice Settings</h3>
                
                <div class="setting-row">
                    <label>Voice Gender:</label>
                    <select id="gender">
                        <option value="male">Male</option>
                        <option value="female" selected>Female</option>
                    </select>
                </div>
                
                <div class="setting-row">
                    <label>Repeat Count:</label>
                    <select id="repeat">
                        <option value="1">No Repeat</option>
                        <option value="2">2 Times</option>
                        <option value="3">3 Times</option>
                        <option value="4">4 Times</option>
                    </select>
                </div>
                
                <div class="setting-row">
                    <label>Delay Between Words:</label>
                    <select id="delay">
                        <option value="0">No Delay</option>
                        <option value="0.1">0.1 sec</option>
                        <option value="0.3">0.3 sec</option>
                        <option value="0.5">0.5 sec</option>
                        <option value="1.0">1.0 sec</option>
                    </select>
                </div>
                
                <div class="setting-row">
                    <label>Speech Rate:</label>
                    <select id="rate">
                        <option value="+0%">Normal</option>
                        <option value="+20%">Fast</option>
                        <option value="+50%">Very Fast</option>
                        <option value="-20%">Slow</option>
                        <option value="-50%">Very Slow</option>
                    </select>
                </div>
            </div>
            
            <div class="text-area">
                <h3>✏️ Enter your text</h3>
                <textarea id="textInput" placeholder="Enter your English text here..."></textarea>
            </div>
            
            <div class="progress-section" style="display:none">
                <label>Progress:</label>
                <progress id="progressBar" value="0" max="100"></progress>
                <span id="progressText">0%</span>
            </div>
            
            <div class="image-upload">
                <button id="imageUploadBtn">📷 Extract text from image</button>
                <input type="file" id="imageInput" accept="image/*" style="display:none">
            </div>
            
            <div class="actions">
                <button id="startBtn" class="start-btn">▶ Start Conversion</button>
                <button id="saveBtn" class="save-btn" disabled>💾 Save Audio</button>
            </div>
            
            <div id="status" class="status">✅ Ready</div>
            
            <audio id="audioPlayer" style="display:none"></audio>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
